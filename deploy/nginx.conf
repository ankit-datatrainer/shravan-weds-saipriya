# Nginx server block for shravan-weds-saipriya.moondropsmanpower.com
#
# This is a SEPARATE file from whatever serves your other app
# (wealth-app, presumably on port 3001). Nginx routes purely by the
# `server_name` / Host header, so this file cannot interfere with
# that app's config, and that app's config cannot interfere with this
# one — as long as they listen on different server_names (they do)
# and proxy to different ports (3002 here vs 3001 for wealth-app).
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/shravan-weds-saipriya.conf
#   sudo ln -s /etc/nginx/sites-available/shravan-weds-saipriya.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then run certbot (see README) to add the HTTPS server block —
# certbot will edit this file in place to add the `listen 443 ssl`
# section and a plain-HTTP-to-HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name shravan-weds-saipriya.moondropsmanpower.com;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
